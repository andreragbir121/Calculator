<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script src="https://kit.fontawesome.com/59b21b487b.js" crossorigin="anonymous"></script>

</head>
<body>
    
    <div class="calculator">

    <textarea class = "output" name="output" id=""></textarea>

    <button value="("><i class="fa-solid fa-bracket-round" style="color: #ff0000;">(</i></button>                      <!--open bracket-->
    <button value=")"><i class="fa-solid fa-bracket-round-right" style="color: #ff0000;">)</i></button>                <!--Close bracket-->
        
    <button value="%"><i class="fa-solid fa-percent" style="color: #ff0000;"></i></button>                              <!--Modula sign-->
    <button value="del"><i class="fa-solid fa-delete-left" style="color: #ff0000;"></i></button>                       <!--Erase Button-->
    <br>

    <button value="7">7</button>
    <button value="8">8</button>
    <button value="9">9</button>    
    <button value="/"><i class="fa-solid fa-divide" style="color: #ff0000;"></i></button>                        <!--Division sign-->

    <br>


    <button value="4">4</button>
    <button value="5">5</button>
    <button value="6">6</button>
    <button value="*"><i class="fa-solid fa-xmark" style="color: #ff0000;"></i></button>                       <!--Multiplication sign-->

    <br>
    
    <button value="1">1</button>
    <button value="2">2</button>
    <button value="3">3</button>
    <button value="-"><i class="fa-solid fa-minus" style="color: #ff0000;"></i></button>                             <!--Minus sign-->

    <br>

    <button value="0">0</button>
    <button value="."><i class="fa-solid fa-bracket-round-right" style="color: #ff0000;">.</i></button>               <!--period-->
    <button value="="><i class="fa-solid fa-equals" style="color: #ff0000;"></i></button>                            <!--equals to-->
    <button value="+"><i class="fa-solid fa-plus" style="color: #ff0000;"></i></button>                               <!--addition sign-->

</div>
</body>
</html>
